name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Récupération du code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Installation de Java et Maven (Indispensable pour éviter l'erreur 127)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Compilation du Backend (Génère le JAR nécessaire pour Docker)
      - name: Build Backend JAR
        run: mvn -f springboot/app/pom.xml clean package -DskipTests

      # 4. Connexion à Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Build et Push des images
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./springboot/app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/backend-app:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./angular-app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/frontend-app:latest

      # Étape 6 : Test final
      - name: Test Application
        run: |
          docker compose up -d
          sleep 30
          docker ps